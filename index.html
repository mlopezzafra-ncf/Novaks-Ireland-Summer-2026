<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Novaks Go To Ireland</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Crimson+Text:ital@0;1&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }

        html, body {
            margin: 0;
            padding: 0;
            min-height: 100%;
        }

        body {
            font-family: 'Crimson Text', Georgia, serif;
            color: #1a0f0a;
            background-color: #2d1810;
            position: relative;
        }

        /* Ireland Map as faded background for the entire website */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: url('ireland-map.png');
            background-repeat: no-repeat;
            background-position: center center;
            background-size: contain;
            background-attachment: fixed;
            opacity: 0.30;
            z-index: 0;
            pointer-events: none;
        }

        body::after {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background:
                repeating-linear-gradient(0deg, rgba(139,69,19,0.03) 0px, transparent 1px, transparent 2px, rgba(139,69,19,0.015) 3px),
                repeating-linear-gradient(90deg, rgba(139,69,19,0.03) 0px, transparent 1px, transparent 2px, rgba(139,69,19,0.015) 3px),
                linear-gradient(135deg, rgba(249,243,234,0.70) 0%, rgba(240,232,220,0.64) 25%, rgba(235,229,217,0.60) 50%, rgba(240,232,220,0.64) 75%, rgba(249,243,234,0.70) 100%);
            z-index: 1;
            pointer-events: none;
        }

        .manuscript-bg { position: relative; min-height: 100vh; }
        .content-wrapper { position: relative; z-index: 2; }

        .manuscript-header {
            text-align: center;
            padding: 70px 40px;
            position: relative;
            background:
                linear-gradient(135deg, rgba(26,15,10,0.55) 0%, rgba(45,24,16,0.45) 50%, rgba(26,15,10,0.55) 100%),
                url('header.png') center center / cover no-repeat;
            border: 4px double #8b4513;
            border-radius: 2px;
            margin-bottom: 40px;
            box-shadow:
                0 10px 30px rgba(0,0,0,0.4),
                inset 0 1px 0 rgba(255,255,255,0.5),
                inset 0 -1px 0 rgba(0,0,0,0.2);
            overflow: hidden;
        }
        .manuscript-header::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: repeating-linear-gradient(90deg, transparent, transparent 2px, rgba(139,69,19,0.05) 2px, rgba(139,69,19,0.05) 4px);
            pointer-events: none;
        }
        .manuscript-header h1 {
            color: #ffd700;
            text-shadow: 3px 3px 10px rgba(0,0,0,0.9), 0 0 20px rgba(0,0,0,0.6);
        }
        .manuscript-header .gold-text,
        .manuscript-header p {
            color: #faf6f0;
            text-shadow: 2px 2px 6px rgba(0,0,0,0.85);
        }
        .manuscript-header .celtic-corner {
            color: #ffd700;
            border-color: #ffd700;
            background: radial-gradient(circle, rgba(0,0,0,0.5) 0%, transparent 70%);
        }
        .manuscript-header .ornament-line {
            background: linear-gradient(90deg, transparent, #ffd700, transparent);
        }
        .manuscript-header .ornamental-divider {
            color: #ffd700;
            text-shadow: 2px 2px 6px rgba(0,0,0,0.8);
        }
        .header-content { position: relative; z-index: 2; }

        .celtic-corner {
            width: 80px; height: 80px;
            margin: 20px auto;
            border: 3px solid #8b4513;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 48px; color: #8b4513;
            background: radial-gradient(circle, rgba(212,165,116,0.4) 0%, transparent 70%);
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.2), 0 4px 8px rgba(0,0,0,0.15);
        }

        .ornament-line {
            height: 3px;
            background: linear-gradient(90deg, transparent, #8b4513, transparent);
            margin: 15px auto;
            width: 60%; max-width: 300px;
        }

        /* Day card */
        .day-card {
            background: linear-gradient(135deg, rgba(250,246,240,0.95) 0%, rgba(245,240,232,0.93) 50%, rgba(250,246,240,0.95) 100%);
            backdrop-filter: blur(3px);
            border: 3px solid #8b4513;
            border-radius: 2px;
            box-shadow: 0 12px 25px rgba(0,0,0,0.25), inset 0 1px 0 rgba(255,255,255,0.6), inset 0 -2px 5px rgba(0,0,0,0.05);
            position: relative;
            overflow: hidden;
            padding: 0;
            margin-bottom: 30px;
            background-size: cover;
            background-position: center center;
            background-repeat: no-repeat;
        }

        .day-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 6px;
            background: linear-gradient(90deg, #8b4513 0%, #d4a574 25%, #8b4513 50%, #d4a574 75%, #8b4513 100%);
            z-index: 2;
        }

        .day-card::after {
            content: '';
            position: absolute;
            top: 0; right: 0;
            width: 40px; height: 40px;
            background: radial-gradient(circle, #d4a574 0%, transparent 70%);
            opacity: 0.3;
            z-index: 2;
        }

        .day-card.expanded {
            background: linear-gradient(135deg, rgba(250,246,240,0.88) 0%, rgba(245,240,232,0.84) 50%, rgba(250,246,240,0.88) 100%);
        }

        .day-card-corner-decoration {
            position: absolute;
            top: 10px; right: 15px;
            font-size: 24px;
            color: #8b4513;
            opacity: 0.3;
            z-index: 10;
        }

        .day-card-content {
            padding: 30px;
            position: relative;
            z-index: 1;
            background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(139,69,19,0.02) 2px, rgba(139,69,19,0.02) 4px);
        }

        /* When a day is expanded, add a parchment overlay over its image so text is legible */
        .day-card.expanded .day-card-content {
            background:
                repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(139,69,19,0.02) 2px, rgba(139,69,19,0.02) 4px),
                linear-gradient(135deg, rgba(250,246,240,0.86) 0%, rgba(245,240,232,0.82) 50%, rgba(250,246,240,0.86) 100%);
        }

        .day-header {
            text-align: center;
            padding-bottom: 20px;
            border-bottom: 3px solid #8b4513;
            margin-bottom: 20px;
            position: relative;
        }
        .day-header > div:first-child { display: inline-block; }
        .day-header .day-highlight {
            display: inline-block;
            border-left: none;
            padding-left: 0;
            border-top: 2px dotted #d4a574;
            padding-top: 6px;
            margin-top: 6px;
        }
        .day-header .toggle-btn {
            position: absolute;
            top: 0;
            right: 0;
        }
        .day-header::after {
            content: '\25C6 \25C6 \25C6';
            position: absolute;
            bottom: -25px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 12px;
            color: #8b4513;
            letter-spacing: 8px;
            opacity: 0.5;
        }
        .day-date { font-family: 'Cinzel', serif; font-size: 32px; font-weight: bold; color: #8b4513; text-shadow: 2px 2px 2px rgba(212,165,116,0.6); }
        .day-location { font-family: 'Cinzel', serif; font-size: 24px; color: #1a0f0a; margin: 8px 0; text-shadow: 1px 1px 1px rgba(255,255,255,0.3); }
        .day-highlight { font-size: 16px; font-style: italic; color: #8b4513; border-left: 3px solid #d4a574; padding-left: 10px; }

        .toggle-btn {
            font-size: 32px;
            color: #8b4513;
            cursor: pointer;
            user-select: none;
            transition: all 0.3s;
            filter: drop-shadow(1px 1px 1px rgba(0,0,0,0.2));
        }
        .toggle-btn:hover { transform: scale(1.25); color: #d4a574; }

        .day-brief {
            background: linear-gradient(135deg, rgba(212,165,116,0.2) 0%, rgba(139,69,19,0.1) 100%);
            padding: 18px;
            border-left: 5px solid #8b4513;
            border-top: 2px dashed #d4a574;
            border-bottom: 2px dashed #d4a574;
            margin: 20px 0;
            font-size: 16px;
            line-height: 1.7;
            color: #1a0f0a;
            box-shadow: inset 0 1px 3px rgba(0,0,0,0.05);
        }

        .expanded-content {
            border-top: 3px solid #8b4513;
            padding-top: 25px;
            margin-top: 25px;
        }

        .section-title {
            font-family: 'Cinzel', serif;
            font-size: 20px;
            color: #8b4513;
            font-weight: bold;
            margin: 25px 0 15px 0;
            padding-bottom: 10px;
            border-bottom: 2px dotted #d4a574;
            text-shadow: 1px 1px 1px rgba(212,165,116,0.4);
            text-align: center;
        }

        .map-container {
            border: 4px solid #8b4513;
            border-radius: 2px;
            overflow: hidden;
            box-shadow: 0 8px 20px rgba(0,0,0,0.25), inset 0 1px 0 rgba(255,255,255,0.3);
            margin: 20px 0;
            background: linear-gradient(135deg, #e8f4f8 0%, #d0e8f0 100%);
            position: relative;
        }
        .map-container > div { width: 100%; height: 350px; }

        .map-container-vertical { max-width: 520px; margin: 0 auto; }
        .map-container-vertical > div { width: 100%; height: 720px; }

        .hotel-info {
            background: linear-gradient(135deg, rgba(139,69,19,0.15) 0%, rgba(212,165,116,0.1) 100%);
            padding: 15px;
            border-left: 5px solid #8b4513;
            border-top: 2px dotted #d4a574;
            margin: 12px 0;
            border-radius: 2px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        .hotel-name { font-weight: bold; color: #8b4513; font-size: 18px; text-shadow: 1px 1px 1px rgba(212,165,116,0.4); }
        .hotel-details { font-size: 14px; color: #555; margin-top: 6px; font-style: italic; }

        /* Guide cards (Things to Do / Visit / Eat) */
        .guide-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
            margin: 12px 0;
        }

        .guide-card {
            background: linear-gradient(135deg, rgba(250,246,240,0.92) 0%, rgba(245,240,232,0.88) 100%);
            border: 2px solid #d4a574;
            border-left: 5px solid #8b4513;
            padding: 14px 16px;
            border-radius: 2px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.08);
        }

        .guide-card-image {
            width: 100%;
            max-height: 220px;
            object-fit: cover;
            border-radius: 2px;
            border: 2px solid #d4a574;
            margin: 0 0 12px 0;
            display: block;
            box-shadow: 0 3px 8px rgba(0,0,0,0.15);
        }

        .guide-card a {
            color: #8b4513;
            text-decoration: underline;
            font-weight: bold;
        }
        .guide-card a:hover { color: #6b3410; }

        .guide-head {
            display: flex;
            align-items: baseline;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 6px;
        }

        .guide-name {
            font-family: 'Cinzel', serif;
            font-size: 17px;
            font-weight: bold;
            color: #8b4513;
        }

        .guide-type {
            font-size: 11px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 3px 9px;
            border-radius: 12px;
            background: #8b4513;
            color: #ffd700;
        }

        .guide-type.restaurant { background: #7c3e15; }
        .guide-type.pub { background: #3f2417; }
        .guide-type.museum { background: #4f6b2a; }
        .guide-type.viewpoint { background: #2563eb; }
        .guide-type.walk { background: #15803d; }
        .guide-type.ancient { background: #6b4a1d; }
        .guide-type.quirky { background: #9a3412; }
        .guide-type.shop { background: #9d4edd; }
        .guide-type.cafe { background: #d97706; }
        .guide-type.site { background: #6b3410; }

        .guide-desc { color: #1a0f0a; font-size: 14px; line-height: 1.5; margin-bottom: 6px; }
        .guide-tip {
            font-size: 13px;
            color: #555;
            font-style: italic;
            border-top: 1px dashed rgba(139,69,19,0.25);
            padding-top: 6px;
        }
        .guide-tip strong { color: #8b4513; font-style: normal; }

        .fun-fact {
            background: linear-gradient(135deg, rgba(255,215,0,0.25) 0%, rgba(212,165,116,0.15) 100%);
            border: 2px solid #8b4513;
            border-radius: 2px;
            padding: 16px 18px;
            margin: 12px 0;
            font-size: 15px;
            line-height: 1.6;
            color: #1a0f0a;
            position: relative;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .fun-fact::before {
            content: '\2728';
            position: absolute;
            top: -12px; left: 18px;
            background: #faf6f0;
            padding: 2px 8px;
            border: 2px solid #8b4513;
            border-radius: 12px;
            font-size: 14px;
        }

        .historical-note {
            background: linear-gradient(135deg, rgba(139,69,19,0.22) 0%, rgba(212,165,116,0.15) 100%);
            padding: 18px;
            border-left: 5px solid #8b4513;
            margin: 15px 0;
            border-radius: 2px;
            font-size: 14px;
            line-height: 1.7;
            color: #333;
            font-style: italic;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        /* Articles list */
        .articles-list {
            display: grid;
            grid-template-columns: 1fr;
            gap: 10px;
        }

        .article-card {
            background: linear-gradient(135deg, rgba(250,246,240,0.92) 0%, rgba(245,240,232,0.88) 100%);
            border: 2px solid #d4a574;
            padding: 12px 14px;
            border-radius: 2px;
            transition: all 0.2s;
        }
        .article-card:hover {
            border-color: #8b4513;
            transform: translateX(3px);
            box-shadow: 0 4px 10px rgba(0,0,0,0.12);
        }

        .article-card a {
            color: #8b4513;
            text-decoration: none;
            font-weight: bold;
            font-size: 15px;
            font-family: 'Cinzel', serif;
        }
        .article-card a:hover { color: #6b3410; text-decoration: underline; }

        .article-source {
            display: inline-block;
            font-size: 11px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #ffd700;
            background: #8b4513;
            padding: 2px 8px;
            border-radius: 10px;
            margin-left: 8px;
            vertical-align: middle;
        }

        .article-desc {
            color: #555;
            font-size: 13px;
            font-style: italic;
            margin-top: 4px;
        }

        /* Calendar card with Ireland postcard as background */
        .calendar-day-card {
            background:
                linear-gradient(135deg, rgba(250,246,240,0.82) 0%, rgba(245,240,232,0.78) 100%),
                url('ireland-postcard.png') center center / cover no-repeat;
            backdrop-filter: blur(2px);
            border: 3px solid #8b4513;
            border-radius: 2px;
            box-shadow: 0 12px 25px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.6);
            position: relative;
            overflow: visible;
            margin-bottom: 30px;
        }
        .calendar-day-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 6px;
            background: linear-gradient(90deg, #8b4513 0%, #d4a574 25%, #8b4513 50%, #d4a574 75%, #8b4513 100%);
        }

        /* Route map card with Ireland Map as background */
        .route-day-card {
            background:
                linear-gradient(135deg, rgba(250,246,240,0.55) 0%, rgba(245,240,232,0.5) 100%),
                url('ireland-map.png') center center / contain no-repeat,
                linear-gradient(135deg, #faf6f0 0%, #f5f0e8 100%);
        }
        .route-day-card .day-card-content {
            background:
                repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(139,69,19,0.02) 2px, rgba(139,69,19,0.02) 4px),
                linear-gradient(135deg, rgba(250,246,240,0.35) 0%, rgba(245,240,232,0.3) 50%, rgba(250,246,240,0.35) 100%);
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 8px;
            padding: 25px;
        }

        .calendar-header {
            font-family: 'Cinzel', serif;
            font-weight: bold;
            text-align: center;
            padding: 12px 5px;
            color: #8b4513;
            font-size: 14px;
            background: linear-gradient(135deg, rgba(250,246,240,0.92) 0%, rgba(240,232,220,0.85) 100%);
            border: 2px solid #d4a574;
            border-radius: 2px;
            text-shadow: 1px 1px 1px rgba(212,165,116,0.5);
        }

        .calendar-cell {
            aspect-ratio: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding-top: 6px;
            border: 2px solid #d4a574;
            background: linear-gradient(135deg, rgba(250,246,240,0.9) 0%, rgba(245,240,232,0.85) 100%);
            border-radius: 2px;
            font-size: 16px;
            font-weight: bold;
            color: #1a0f0a;
            position: relative;
            transition: all 0.3s;
            cursor: default;
            box-shadow: inset 0 1px 2px rgba(255,255,255,0.3);
            overflow: hidden;
        }
        .calendar-cell:hover {
            box-shadow: 0 6px 12px rgba(0,0,0,0.15), inset 0 1px 2px rgba(255,255,255,0.3);
            transform: translateY(-2px);
        }
        .calendar-cell .cell-num { font-size: 18px; line-height: 1; }
        .calendar-cell .cell-loc {
            font-family: 'Cinzel', serif;
            font-size: 9px;
            font-weight: bold;
            color: #8b4513;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-top: 4px;
            text-align: center;
            line-height: 1.1;
            padding: 0 2px;
        }
        .calendar-cell.trip-day {
            border: 3px solid #8b4513;
            box-shadow: 0 8px 16px rgba(139,69,19,0.4), inset 0 1px 0 rgba(255,255,255,0.7);
            font-weight: bold;
            cursor: pointer;
        }
        .calendar-cell.trip-day:hover {
            transform: translateY(-3px) scale(1.04);
            box-shadow: 0 12px 22px rgba(139,69,19,0.55), inset 0 1px 0 rgba(255,255,255,0.8);
            filter: brightness(1.08);
        }
        .calendar-cell.trip-day::before {
            content: '\2605';
            position: absolute;
            top: -2px; right: 4px;
            font-size: 12px;
            color: #ffd700;
            text-shadow: 1px 1px 1px rgba(0,0,0,0.5);
        }
        .calendar-cell.empty { background: transparent; border: none; cursor: default; box-shadow: none; }

        .calendar-month-label {
            font-family: 'Cinzel', serif;
            font-size: 22px;
            color: #8b4513;
            text-align: center;
            font-weight: bold;
            padding: 20px 0 10px 0;
            text-shadow: 1px 1px 2px rgba(255,255,255,0.5);
        }

        .nav-button {
            font-family: 'Cinzel', serif;
            font-weight: bold;
            padding: 14px 28px;
            border: 3px solid #8b4513;
            background: linear-gradient(135deg, #d4a574 0%, #c89860 100%);
            color: white;
            cursor: pointer;
            border-radius: 2px;
            transition: all 0.3s;
            font-size: 16px;
            text-transform: uppercase;
            letter-spacing: 2px;
            box-shadow: 0 6px 15px rgba(0,0,0,0.3);
            text-shadow: 1px 1px 2px rgba(0,0,0,0.3);
        }
        .nav-button:hover {
            background: linear-gradient(135deg, #c89860 0%, #b8884a 100%);
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.4);
        }
        .nav-button.active {
            background: linear-gradient(135deg, #8b4513 0%, #6b3410 100%);
            color: #ffd700;
            box-shadow: 0 8px 20px rgba(139,69,19,0.5), inset 0 2px 5px rgba(0,0,0,0.3);
        }

        .ornamental-divider {
            text-align: center;
            font-size: 22px;
            color: #8b4513;
            margin: 25px 0;
            letter-spacing: 15px;
            font-weight: bold;
            text-shadow: 1px 1px 2px rgba(212,165,116,0.5);
        }

        h1 {
            font-family: 'Cinzel', serif;
            color: #8b4513;
            text-shadow: 3px 3px 6px rgba(212,165,116,0.6);
            letter-spacing: 2px;
        }
        .gold-text { color: #8b4513; text-shadow: 1px 1px 2px rgba(212,165,116,0.6); }

        .footer {
            text-align: center;
            padding: 40px;
            border-top: 4px double #8b4513;
            margin-top: 50px;
            font-style: italic;
            color: #8b4513;
            background: linear-gradient(135deg, rgba(212,165,116,0.3) 0%, rgba(139,69,19,0.18) 100%);
        }

        .tab-nav { display: flex; gap: 15px; flex-wrap: wrap; justify-content: center; margin-bottom: 40px; }

        .route-summary {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 260px));
            gap: 20px;
            margin: 25px auto;
            justify-content: center;
            max-width: 1100px;
        }
        .route-card {
